version: 2
updates:
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      openzeppelin:
        patterns:
          - "lib/openzeppelin-*"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "smart-contracts"
